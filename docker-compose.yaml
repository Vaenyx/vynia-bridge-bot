services:
  bridge-bot:
    image: "vynia-bridge-bot:latest"
    build:
      context: ./src/
      dockerfile: Dockerfile
      network: host
    restart: unless-stopped
    container_name: hypixel-bridge-bot
    volumes:
      - .minecraft:/root/.minecraft
    environment:
      - BRIDGE_ACCOUNT_EMAIL
      - BRIDGE_DISCORD_TOKEN
      - BRIDGE_DISCORD_CHANNEL

      # For commands
      - URCHIN_API_KEY
      - HYPIXEL_API_KEY

      # Redis cache
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: vynia-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  redis_data:
